# /etc/nginx/sites-available/sarui
# Reemplaza TU_DOMINIO.COM con tu dominio real
# Habilitar: sudo ln -s /etc/nginx/sites-available/sarui /etc/nginx/sites-enabled/
# SSL:        sudo certbot --nginx -d TU_DOMINIO.COM -d www.TU_DOMINIO.COM -d api.TU_DOMINIO.COM

# ─── Redirigir HTTP → HTTPS ────────────────────────────────────────────────
server {
    listen 80;
    server_name TU_DOMINIO.COM www.TU_DOMINIO.COM api.TU_DOMINIO.COM;
    return 301 https://$host$request_uri;
}

# ─── Frontend (Next.js) ────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name TU_DOMINIO.COM www.TU_DOMINIO.COM;

    # Certbot llena esto automáticamente
    ssl_certificate     /etc/letsencrypt/live/TU_DOMINIO.COM/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/TU_DOMINIO.COM/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ─── API (Express) ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.TU_DOMINIO.COM;

    ssl_certificate     /etc/letsencrypt/live/TU_DOMINIO.COM/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/TU_DOMINIO.COM/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Límite de tamaño para uploads
    client_max_body_size 10M;

    location / {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
