# /etc/nginx/sites-available/sarui
# Dominio: sarui.com.mx
# Nota: Maria Vita (maria-vita.mx) debe tener su propio archivo .conf
# Habilitar ambas: 
#   sudo ln -s /etc/nginx/sites-available/sarui /etc/nginx/sites-enabled/
#   sudo ln -s /etc/nginx/sites-available/maria-vita /etc/nginx/sites-enabled/

# ─── Redirigir HTTP → HTTPS ────────────────────────────────────────────────
server {
    listen 80;
    server_name sarui.com.mx www.sarui.com.mx api.sarui.com.mx;
    return 301 https://$host$request_uri;
}

# ─── Frontend (Next.js) ────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name sarui.com.mx www.sarui.com.mx;

    # Certbot llena esto automáticamente
    ssl_certificate     /etc/letsencrypt/live/sarui.com.mx/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sarui.com.mx/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ─── API (Express) ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.sarui.com.mx;

    ssl_certificate     /etc/letsencrypt/live/sarui.com.mx/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sarui.com.mx/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Límite de tamaño para uploads
    client_max_body_size 10M;

    location / {
        proxy_pass         http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
